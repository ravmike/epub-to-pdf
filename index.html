<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EPUB ‚Üí PDF</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&display=swap');

  :root {
    --bg: #0e0e10;
    --surface: #18181b;
    --border: #27272a;
    --text: #e4e4e7;
    --text-dim: #71717a;
    --accent: #f97316;
    --accent-dim: #f9731622;
    --success: #22c55e;
    --error: #ef4444;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'JetBrains Mono', monospace;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2rem;
  }

  .container { width: 100%; max-width: 560px; }
  header { margin-bottom: 2.5rem; }
  h1 { font-size: 1.8rem; font-weight: 700; letter-spacing: -0.03em; margin-bottom: 0.4rem; }
  h1 span { color: var(--accent); }
  .subtitle { color: var(--text-dim); font-size: 0.75rem; line-height: 1.6; }

  .drop-zone {
    border: 2px dashed var(--border);
    border-radius: 12px;
    padding: 3rem 2rem;
    text-align: center;
    cursor: pointer;
    transition: all 0.2s;
    background: var(--surface);
  }
  .drop-zone:hover, .drop-zone.drag-over { border-color: var(--accent); background: var(--accent-dim); }
  .drop-zone.drag-over .drop-icon { transform: scale(1.15); }
  .drop-icon { font-size: 2.5rem; margin-bottom: 1rem; transition: transform 0.2s; display: block; }
  .drop-label { font-size: 0.85rem; color: var(--text-dim); line-height: 1.8; }
  .drop-label strong { color: var(--accent); font-weight: 600; }
  input[type="file"] { display: none; }

  .settings { margin-top: 1.5rem; display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; }
  .setting { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 0.75rem 1rem; }
  .setting label { display: block; font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-dim); margin-bottom: 0.4rem; }
  .setting select, .setting input { width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: 4px; color: var(--text); font-family: inherit; font-size: 0.8rem; padding: 0.4rem 0.5rem; outline: none; }
  .setting select:focus, .setting input:focus { border-color: var(--accent); }

  .status { margin-top: 1.5rem; display: none; }
  .status.visible { display: block; }
  .progress-bar { height: 4px; background: var(--border); border-radius: 2px; overflow: hidden; margin-bottom: 0.75rem; }
  .progress-fill { height: 100%; background: var(--accent); border-radius: 2px; width: 0%; transition: width 0.3s; }
  .status-text { font-size: 0.75rem; color: var(--text-dim); display: flex; align-items: center; gap: 0.5rem; }
  .status-text.error { color: var(--error); }
  .status-text.success { color: var(--success); }
  .spinner { width: 14px; height: 14px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; flex-shrink: 0; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .log { margin-top: 1.5rem; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 1rem; max-height: 200px; overflow-y: auto; font-size: 0.7rem; color: var(--text-dim); line-height: 1.8; display: none; }
  .log.visible { display: block; }
  .log .warn { color: var(--accent); }
  .log .err { color: var(--error); }
  .log .ok { color: var(--success); }

  .result { margin-top: 1.5rem; display: none; }
  .result.visible { display: block; }
  .result button { width: 100%; padding: 0.9rem; background: var(--accent); color: #000; border: none; border-radius: 8px; font-family: inherit; font-size: 0.85rem; font-weight: 700; cursor: pointer; transition: opacity 0.15s; }
  .result button:hover { opacity: 0.85; }
  .file-info { margin-top: 0.6rem; font-size: 0.7rem; color: var(--text-dim); text-align: center; }

  footer { margin-top: 3rem; font-size: 0.65rem; color: var(--text-dim); text-align: center; line-height: 1.6; opacity: 0.6; }
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>EPUB <span>‚Üí</span> PDF</h1>
    <p class="subtitle">Client-side converter ¬∑ full Unicode ¬∑ nothing leaves your browser</p>
  </header>

  <div class="drop-zone" id="dropZone">
    <span class="drop-icon">üìñ</span>
    <p class="drop-label">Drop <strong>.epub</strong> here or click to choose</p>
    <input type="file" id="fileInput" accept=".epub">
  </div>

  <div class="settings">
    <div class="setting"><label>Page size</label><select id="pageSize"><option value="a4">A4</option><option value="a5">A5</option><option value="letter">Letter</option></select></div>
    <div class="setting"><label>Font size (pt)</label><input type="number" id="fontSize" value="11" min="8" max="24"></div>
    <div class="setting"><label>Margin (mm)</label><input type="number" id="pageMargin" value="20" min="5" max="50"></div>
    <div class="setting"><label>Line height</label><select id="lineHeight"><option value="1.4">Compact</option><option value="1.6" selected>Normal</option><option value="1.8">Relaxed</option><option value="2.0">Double</option></select></div>
  </div>

  <div class="status" id="status">
    <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
    <div class="status-text" id="statusText"><div class="spinner" id="spinner"></div><span id="statusLabel"></span></div>
  </div>
  <div class="log" id="log"></div>
  <div class="result" id="result">
    <button id="downloadBtn">Download PDF</button>
    <div class="file-info" id="fileInfo"></div>
  </div>
  <footer>JSZip + jsPDF + Noto Sans ¬∑ zero server calls</footer>
</div>

<script>
const { jsPDF } = window.jspdf;

// Google Noto Sans variable font ‚Äî full Unicode coverage including Cyrillic, Latin-ext, Greek, Vietnamese, etc.
const FONT_URL = 'https://cdn.jsdelivr.net/gh/google/fonts@main/ofl/notosans/NotoSans%5Bwdth%2Cwght%5D.ttf';

const $ = id => document.getElementById(id);
let pdfBlob = null, pdfFileName = '', fontCache = null;

// --- UI ---
$('dropZone').addEventListener('click', () => $('fileInput').click());
$('dropZone').addEventListener('dragover', e => { e.preventDefault(); $('dropZone').classList.add('drag-over'); });
$('dropZone').addEventListener('dragleave', () => $('dropZone').classList.remove('drag-over'));
$('dropZone').addEventListener('drop', e => {
  e.preventDefault(); $('dropZone').classList.remove('drag-over');
  const f = e.dataTransfer.files[0];
  if (f?.name.endsWith('.epub')) handleFile(f); else addLog('Drop an .epub file', 'err');
});
$('fileInput').addEventListener('change', e => { if (e.target.files[0]) handleFile(e.target.files[0]); });
$('downloadBtn').addEventListener('click', () => {
  if (!pdfBlob) return;
  const a = document.createElement('a');
  a.href = URL.createObjectURL(pdfBlob);
  a.download = pdfFileName; a.click();
  URL.revokeObjectURL(a.href);
});

function addLog(msg, cls='') {
  $('log').classList.add('visible');
  const d = document.createElement('div');
  if (cls) d.className = cls;
  d.textContent = new Date().toLocaleTimeString() + ' ' + msg;
  $('log').appendChild(d);
  $('log').scrollTop = $('log').scrollHeight;
}
function setStatus(msg, type='progress') {
  $('status').classList.add('visible');
  $('statusLabel').textContent = msg;
  $('statusText').className = 'status-text' + (type==='error'?' error':type==='success'?' success':'');
  $('spinner').style.display = type==='progress'?'block':'none';
}
function setProgress(p) { $('progressFill').style.width = p+'%'; }

// --- Font ---
async function loadFont() {
  if (fontCache) return fontCache;
  addLog('Downloading Noto Sans (full Unicode)‚Ä¶');
  const r = await fetch(FONT_URL);
  if (!r.ok) throw new Error('Font download failed: ' + r.status);
  fontCache = await r.arrayBuffer();
  addLog(`Font: ${(fontCache.byteLength/1048576).toFixed(1)} MB loaded`, 'ok');
  return fontCache;
}

function ab2b64(buf) {
  const u8 = new Uint8Array(buf);
  let s = '';
  for (let i = 0; i < u8.length; i += 8192)
    s += String.fromCharCode.apply(null, u8.subarray(i, i + 8192));
  return btoa(s);
}

function registerFont(doc, data) {
  const b = ab2b64(data);
  doc.addFileToVFS('NotoSans-Regular.ttf', b);
  doc.addFont('NotoSans-Regular.ttf', 'NotoSans', 'normal');
  doc.addFileToVFS('NotoSans-Bold.ttf', b);
  doc.addFont('NotoSans-Bold.ttf', 'NotoSans', 'bold');
}

// --- EPUB ---
async function parseEpub(buf) {
  const zip = await JSZip.loadAsync(buf);
  addLog('EPUB opened');

  const cxml = await zip.file('META-INF/container.xml')?.async('text');
  if (!cxml) throw new Error('Invalid EPUB: no container.xml');
  const parser = new DOMParser();
  const cdoc = parser.parseFromString(cxml, 'application/xml');
  const opfPath = cdoc.querySelector('rootfile')?.getAttribute('full-path');
  if (!opfPath) throw new Error('No rootfile in container.xml');
  const opfDir = opfPath.includes('/') ? opfPath.substring(0, opfPath.lastIndexOf('/')+1) : '';
  addLog('OPF: ' + opfPath);

  const opfXml = await zip.file(opfPath)?.async('text');
  if (!opfXml) throw new Error('Cannot read OPF');
  const opfDoc = parser.parseFromString(opfXml, 'application/xml');

  const titleEl = opfDoc.getElementsByTagNameNS('http://purl.org/dc/elements/1.1/', 'title')[0]
                || opfDoc.querySelector('metadata title');
  const bookTitle = titleEl?.textContent?.trim() || 'Untitled';
  addLog('Title: ' + bookTitle);

  const manifest = {};
  opfDoc.querySelectorAll('manifest item').forEach(it => {
    manifest[it.getAttribute('id')] = { href: it.getAttribute('href'), mt: it.getAttribute('media-type') };
  });

  const spine = [];
  opfDoc.querySelectorAll('spine itemref').forEach(ref => {
    const id = ref.getAttribute('idref');
    if (manifest[id]) spine.push(manifest[id]);
  });
  addLog(`Spine: ${spine.length} items`, 'ok');
  if (!spine.length) throw new Error('Empty spine');

  // images
  const imgs = {};
  for (const [,e] of Object.entries(manifest)) {
    if (!e.mt?.startsWith('image/')) continue;
    for (const p of [opfDir+e.href, e.href]) {
      const f = zip.file(p);
      if (f) {
        try {
          const b = await f.async('base64');
          const uri = `data:${e.mt};base64,${b}`;
          imgs[e.href] = uri;
          imgs[e.href.split('/').pop()] = uri;
        } catch(_){}
        break;
      }
    }
  }

  const chapters = [];
  for (const item of spine) {
    let html = null;
    for (const p of [opfDir+item.href, item.href]) {
      const f = zip.file(p);
      if (f) { html = await f.async('text'); break; }
    }
    if (!html) { addLog('Missing: '+item.href, 'warn'); continue; }
    html = html.replace(/(src\s*=\s*["'])([^"']+)(["'])/gi, (m,a,s,b) => {
      const c = s.replace(/^(\.\.\/)+/,'').replace(/^\.\//,'');
      return a + (imgs[c] || imgs[c.split('/').pop()] || s) + b;
    });
    chapters.push({ href: item.href, html });
  }
  addLog(`${chapters.length} chapters in correct order`, 'ok');
  return { bookTitle, chapters };
}

// --- HTML ‚Üí blocks ---
function toBlocks(html) {
  const m = html.match(/<body[^>]*>([\s\S]*?)<\/body>/i);
  const div = document.createElement('div');
  div.innerHTML = m ? m[1] : html;
  const out = [];

  function isChapterTitle(n) {
    // Only detect headings by explicit chapter/section keywords.
    // The old <strong>-based heuristic caused massive false-positives (any
    // bold emphasis, dialog line, or author name was treated as a chapter title).
    const t = n.textContent.trim();
    if (t.length < 2 || t.length > 200) return false;
    return /^(–≥–ª–∞–≤–∞|chapter|—á–∞—Å—Ç—å|part|–∫–Ω–∏–≥–∞|book|—Ä–∞–∑–¥–µ–ª|section|–ø—Ä–æ–ª–æ–≥|—ç–ø–∏–ª–æ–≥|prologue|epilogue)\b/i.test(t);
  }

  (function walk(n) {
    if (n.nodeType === 3) { const t = n.textContent.replace(/\s+/g,' ').trim(); if (t) out.push({T:'t',text:t}); return; }
    if (n.nodeType !== 1) return;
    const tag = n.tagName.toLowerCase();
    if (['script','style','svg','nav'].includes(tag)) return;
    if (/^h[1-6]$/.test(tag)) { const t=n.textContent.trim(); if(t) out.push({T:'h',lv:+tag[1],text:t}); return; }
    if (tag==='br') { out.push({T:'br'}); return; }
    if (tag==='hr') { out.push({T:'hr'}); return; }
    if (tag==='img') { const s=n.getAttribute('src')||''; if(s.startsWith('data:image')) out.push({T:'img',src:s}); return; }
    if (tag==='p') {
      // Empty-line paragraph (FB2‚ÜíEPUB pattern)
      if (n.classList.contains('empty-line') || n.textContent.trim() === '') {
        out.push({T:'br'});
        return;
      }
      // Extract images first
      n.querySelectorAll('img').forEach(i=>{ const s=i.getAttribute('src')||''; if(s.startsWith('data:image')) out.push({T:'img',src:s}); });
      const t = n.textContent.trim();
      if (!t) return;
      // Chapter title detection
      if (isChapterTitle(n)) {
        out.push({T:'h', lv:1, text:t});
        return;
      }
      // Sub-walk to preserve <br> line breaks inside the paragraph
      const segs = [];
      (function pw(pn) {
        if (pn.nodeType===3) { segs.push(pn.textContent.replace(/\s+/g,' ')); return; }
        if (pn.nodeType!==1) return;
        if (pn.tagName==='BR') { segs.push('\n'); return; }
        for (const c of pn.childNodes) pw(c);
      })(n);
      const parts = segs.join('').split('\n');
      for (let i=0; i<parts.length; i++) {
        const s = parts[i].trim();
        if (s) out.push({T:'p', text:s});
        if (i < parts.length-1) out.push({T:'br'});
      }
      return;
    }
    if (['blockquote','li','figcaption','td','th','dt','dd','address','pre'].includes(tag)) {
      n.querySelectorAll('img').forEach(i=>{ const s=i.getAttribute('src')||''; if(s.startsWith('data:image')) out.push({T:'img',src:s}); });
      const t=n.textContent.trim();
      if(t) out.push({T:'p',text:(tag==='li'?'‚Ä¢ ':'')+t});
      return;
    }
    // Container elements (div, span, section, article, body) ‚Äî recurse into children
    for (const c of n.childNodes) walk(c);
  })(div);
  return out;
}

// --- Convert ---
async function handleFile(file) {
  pdfBlob = null;
  $('result').classList.remove('visible');
  $('log').innerHTML = '';
  $('log').classList.remove('visible');
  setProgress(0);

  pdfFileName = file.name.replace(/\.epub$/i,'') + '.pdf';

  try {
    addLog(`File: ${file.name} (${(file.size/1048576).toFixed(2)} MB)`);

    setStatus('Loading font‚Ä¶'); setProgress(5);
    const fontData = await loadFont();
    setProgress(12);

    setStatus('Reading EPUB‚Ä¶');
    const abuf = await file.arrayBuffer();
    setProgress(18);

    setStatus('Parsing structure‚Ä¶');
    const epub = await parseEpub(abuf);
    setProgress(30);

    setStatus('Preparing PDF‚Ä¶');
    const pgKey = $('pageSize').value;
    const fSize = parseInt($('fontSize').value)||11;
    const mgn = parseInt($('pageMargin').value)||20;
    const lh = parseFloat($('lineHeight').value)||1.6;
    const sizes = {a4:[210,297],a5:[148,210],letter:[215.9,279.4]};
    const [pw,ph] = sizes[pgKey]||sizes.a4;
    const uw = pw-mgn*2, uh = ph-mgn*2;
    const pt2mm = 0.3528;

    const doc = new jsPDF({unit:'mm',format:[pw,ph]});
    registerFont(doc, fontData);
    doc.setFont('NotoSans','normal');
    addLog('Font registered', 'ok');
    setProgress(35);

    // title page
    doc.setFontSize(22); doc.setFont('NotoSans','bold');
    const tl = doc.splitTextToSize(epub.bookTitle, uw*0.8);
    doc.text(tl, pw/2, ph/2 - tl.length*22*pt2mm*0.7, {align:'center'});
    doc.setFont('NotoSans','normal'); doc.setFontSize(fSize);

    let cy = mgn;
    const np = () => { doc.addPage([pw,ph]); cy=mgn; };
    const indent = 7; // first-line indent in mm for paragraphs
    const outlineItems = []; // for PDF outline/bookmarks

    function wr(text, bold=false, fs=fSize, after=0, firstIndent=0) {
      doc.setFontSize(fs);
      doc.setFont('NotoSans', bold?'bold':'normal');
      const lhm = fs*pt2mm*lh;
      const lines = doc.splitTextToSize(text, uw - firstIndent);
      for (let li=0; li<lines.length; li++) {
        if (cy+lhm > ph-mgn) np();
        const x = mgn + (li===0 ? firstIndent : 0);
        doc.text(lines[li], x, cy);
        cy += lhm;
      }
      cy += after;
    }

    for (let ci=0; ci<epub.chapters.length; ci++) {
      const blocks = toBlocks(epub.chapters[ci].html);
      if (!blocks.length) continue;
      np();
      const lhm = fSize*pt2mm*lh;

      for (const b of blocks) {
        if (b.T==='h') {
          const major = b.lv <= 2;
          if (major) {
            // h1/h2: chapter-level break ‚Äî start on a fresh page
            if (cy > mgn + lhm) np();
          } else {
            // h3‚Äìh6: in-page section header ‚Äî just add some breathing room
            cy += lhm * 0.6;
            if (cy + lhm * 3 > ph - mgn) np();
          }
          const hs = b.lv === 1 ? Math.round(fSize * 1.5)
                   : b.lv === 2 ? Math.round(fSize * 1.3)
                   : Math.round(fSize * 1.15);
          const hsLhm = hs * pt2mm * lh;
          if (major) cy += hsLhm * 0.8; // top padding for chapter headings
          outlineItems.push({title: b.text, page: doc.internal.getNumberOfPages()});
          wr(b.text, true, hs, hsLhm * 0.5);
        } else if (b.T==='p') {
          wr(b.text, false, fSize, lhm*0.3, indent);
        } else if (b.T==='t') {
          // Raw text node (direct child of container, not inside <p>) ‚Äî no indent
          wr(b.text, false, fSize, lhm*0.1, 0);
        } else if (b.T==='br') {
          cy += lhm*0.6;
        } else if (b.T==='hr') {
          cy += lhm*0.3;
          if (cy+2>ph-mgn) np();
          doc.setDrawColor(160); doc.setLineWidth(0.3);
          doc.line(mgn+uw*0.2, cy, pw-mgn-uw*0.2, cy);
          cy += lhm*0.5;
        } else if (b.T==='img') {
          try {
            const ip = doc.getImageProperties(b.src);
            let iw = Math.min(uw*0.9, ip.width*0.264583);
            let ih = iw*(ip.height/ip.width);
            if (ih>uh*0.55) { ih=uh*0.55; iw=ih*(ip.width/ip.height); }
            if (cy+ih>ph-mgn) np();
            doc.addImage(b.src, mgn+(uw-iw)/2, cy, iw, ih);
            cy += ih+lhm*0.5;
          } catch(_){}
        }
      }

      setProgress(35+Math.round(ci/epub.chapters.length*60));
      setStatus(`Chapter ${ci+1} / ${epub.chapters.length}‚Ä¶`);
      if (ci%2===0) await new Promise(r=>setTimeout(r,0));
    }

    // Add PDF outline (bookmarks) for navigation
    if (outlineItems.length) {
      addLog(`Adding ${outlineItems.length} outline entries‚Ä¶`);
      for (const item of outlineItems) {
        doc.outline.add(null, item.title, {pageNumber: item.page});
      }
      addLog('Outline added', 'ok');
    }

    setProgress(97); setStatus('Generating PDF‚Ä¶');
    await new Promise(r=>setTimeout(r,30));

    pdfBlob = doc.output('blob');
    const mb = (pdfBlob.size/1048576).toFixed(2);
    const pages = doc.internal.getNumberOfPages();

    setProgress(100);
    setStatus(`Done ‚Äî ${pages} pages, ${mb} MB`, 'success');
    addLog(`PDF: ${pages} pages, ${mb} MB`, 'ok');
    $('fileInfo').textContent = `${pdfFileName} ¬∑ ${pages} pages ¬∑ ${mb} MB`;
    $('result').classList.add('visible');

  } catch(err) {
    setStatus('Error: '+err.message, 'error');
    addLog(err.message, 'err');
    console.error(err);
  }
}
</script>
</body>
</html>
